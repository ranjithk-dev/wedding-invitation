<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fatima ❤️ Sajid Wedding</title>

  <link rel="stylesheet" href="style.css" />

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <div class="main-container">

    <div class="card">

      <div class="moon">☪</div>

      <p class="top-text">Together with family & friends</p>

      <h1 class="main-title">Wedding Celebration</h1>

      <p class="sub-text">
        No religion when friends gather ❤️ <br>
        Only food, fun, memories & endless selfies 📸
      </p>

      <div class="names">
        <h1>Sheik Fatima</h1>
        <span>&</span>
        <h1>Sheik Sajid</h1>
      </div>

      <div class="details-box">

        <div class="detail-item">
          <h3>📅 Date</h3>
          <p>17 May 2026 (Sunday)</p>
        </div>

        <div class="detail-item">
          <h3>⏰ Time</h3>
          <p>10:00 AM IST</p>
        </div>

        <div class="detail-item">
          <h3>📍 Venue</h3>
          <p>
            Sri Narasimharaju Function Hall,<br>
            Balajipeta, Bommuru,<br>
            Rajahmundry
          </p>
        </div>

      </div>

      <div id="countdown"></div>

      <div class="button-group">
        <button onclick="playMusic()">🎵 Play Music</button>
</html>
